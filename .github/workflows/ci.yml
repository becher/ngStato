name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @ngstato/core
        working-directory: packages/core
        run: npx tsup

      - name: Test @ngstato/core (169 tests)
        working-directory: packages/core
        run: npx vitest run

      - name: Build @ngstato/testing
        working-directory: packages/testing
        run: npx tsup

      - name: Test @ngstato/testing
        working-directory: packages/testing
        run: npx vitest run

      - name: Build @ngstato/schematics
        working-directory: packages/schematics
        run: npx tsc -p tsconfig.json

      - name: Build @ngstato/eslint-plugin
        working-directory: packages/eslint-plugin
        run: npx tsup src/index.ts --format cjs --dts

      - name: Build VitePress docs
        run: pnpm docs:build
